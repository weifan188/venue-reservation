<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>場地借用平台</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <style>
    /* ── Reset & Base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC',
                   'PingFang TC', sans-serif;
      background: #f1f3f4;
      color: #202124;
      min-height: 100vh;
    }
    button { font-family: inherit; cursor: pointer; }
    textarea { font-family: inherit; resize: vertical; }

    /* ── Login Screen ───────────────────────────────────── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      max-width: 400px;
      width: 100%;
    }
    .login-icon { font-size: 56px; margin-bottom: 16px; }
    .login-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a73e8;
      margin-bottom: 8px;
    }
    .login-sub {
      font-size: 14px;
      color: #5f6368;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    #signin-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 500;
      color: #202124;
      transition: box-shadow .2s, background .2s;
    }
    #signin-btn:hover:not(:disabled) {
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    #signin-btn:disabled { opacity: .6; cursor: not-allowed; }
    #signin-btn img { width: 20px; height: 20px; }

    /* ── App Shell ──────────────────────────────────────── */
    #app { display: none; }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .site-title {
      font-size: 17px;
      font-weight: 700;
      color: #1a73e8;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-info { display: flex; align-items: center; gap: 10px; }
    #user-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      object-fit: cover;
      background: #e8eaed;
    }
    #user-name { font-size: 14px; font-weight: 500; max-width: 120px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-signout {
      padding: 6px 14px;
      background: none;
      border: 1px solid #dadce0;
      border-radius: 18px;
      font-size: 13px;
      color: #5f6368;
      white-space: nowrap;
    }
    .btn-signout:hover { background: #f8f9fa; }

    /* ── Venue Filter Tabs ───────────────────────────────── */
    #venue-filters {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 20px;
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #venue-filters::-webkit-scrollbar { display: none; }
    .venue-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 14px 14px 11px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      font-size: 13px;
      font-weight: 500;
      color: #5f6368;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .venue-btn:hover { color: #202124; }
    .venue-btn.active { color: #1a73e8; border-bottom-color: #1a73e8; }
    .venue-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Main ────────────────────────────────────────────── */
    .main { padding: 20px; max-width: 1300px; margin: 0 auto; }

    /* ── Card ────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #202124;
    }

    /* ── FullCalendar overrides ──────────────────────────── */
    .fc .fc-toolbar-title { font-size: 17px !important; }
    .fc .fc-button {
      background: #fff !important;
      border-color: #dadce0 !important;
      color: #3c4043 !important;
      box-shadow: none !important;
      font-size: 13px !important;
    }
    .fc .fc-button:hover { background: #f8f9fa !important; }
    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      background: #e8f0fe !important;
      color: #1a73e8 !important;
      border-color: #1a73e8 !important;
    }
    .fc-event { border-radius: 6px !important; font-size: 12px !important; }
    .fc-highlight { background: rgba(26,115,232,.12) !important; }

    /* ── My Bookings ─────────────────────────────────────── */
    .booking-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      border-left: 4px solid;
      background: #f8f9fa;
      margin-bottom: 8px;
    }
    .booking-info { flex: 1; min-width: 0; }
    .booking-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .booking-meta { font-size: 12px; color: #5f6368; }
    .btn-outline-danger {
      flex-shrink: 0;
      padding: 5px 12px;
      background: none;
      border: 1px solid #d93025;
      border-radius: 14px;
      font-size: 12px;
      color: #d93025;
      transition: background .15s;
    }
    .btn-outline-danger:hover { background: #fce8e6; }
    .empty-state {
      text-align: center;
      color: #9aa0a6;
      padding: 24px 0;
      font-size: 14px;
    }

    /* ── Modal ───────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: none;               /* toggled to flex in JS */
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .modal-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px 24px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #202124;
    }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .4px;
      color: #5f6368;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-control {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      font-size: 14px;
      color: #202124;
      background: #fff;
      transition: border-color .15s;
    }
    .form-control:focus { outline: none; border-color: #1a73e8; }
    .form-control[readonly] { background: #f8f9fa; color: #5f6368; cursor: default; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .required-star { color: #d93025; margin-left: 2px; }

    /* Modal actions */
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #f1f3f4;
    }
    .btn-primary {
      padding: 10px 24px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: background .15s;
    }
    .btn-primary:hover:not(:disabled) { background: #1765cc; }
    .btn-primary:disabled { background: #bdc1c6; cursor: not-allowed; }
    .btn-secondary {
      padding: 10px 20px;
      background: none;
      color: #5f6368;
      border: 1px solid #dadce0;
      border-radius: 8px;
      font-size: 14px;
    }
    .btn-secondary:hover { background: #f8f9fa; }
    .btn-danger {
      padding: 10px 20px;
      background: none;
      color: #d93025;
      border: 1px solid #d93025;
      border-radius: 8px;
      font-size: 14px;
    }
    .btn-danger:hover { background: #fce8e6; }

    /* Detail modal */
    .detail-row { margin-bottom: 14px; }
    .detail-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: #9aa0a6;
      margin-bottom: 4px;
    }
    .detail-value { font-size: 15px; color: #202124; }
    .venue-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
    }
    .detail-desc {
      font-size: 14px;
      color: #3c4043;
      white-space: pre-line;
      line-height: 1.6;
    }

    /* ── Toast ───────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #323232;
      color: #fff;
      padding: 13px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transition: transform .3s ease, opacity .3s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.success { background: #188038; }
    .toast.error   { background: #c5221f; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .login-card { padding: 32px 20px; }
      .main { padding: 12px; }
      .card { padding: 14px; }
      .modal-card { padding: 24px 16px 16px; }
      #user-name { display: none; }
      .form-row { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>

<!-- ── 登入畫面 ──────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">🏫</div>
    <h1 class="login-title">場地借用平台</h1>
    <p class="login-sub">請使用學校 Google 帳號登入<br>即可即時查看場地空檔並進行預約</p>
    <button id="signin-btn" onclick="App.signIn()" disabled>
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      使用 Google 帳號登入
    </button>
  </div>
</div>

<!-- ── 主應用程式 ─────────────────────────────────────────── -->
<div id="app">

  <!-- Header -->
  <header>
    <div class="site-title">🏫&nbsp; 場地借用平台</div>
    <div class="user-info">
      <img id="user-avatar" src="" alt="頭像"
           onerror="this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 36 36\'><circle cx=\'18\' cy=\'18\' r=\'18\' fill=\'%23bdc1c6\'/></svg>'">
      <span id="user-name"></span>
    </div>
    <button class="btn-signout" onclick="App.signOut()">登出</button>
  </header>

  <!-- Venue Filter Tabs -->
  <nav id="venue-filters"></nav>

  <!-- Main Content -->
  <div class="main">

    <!-- 行事曆 -->
    <div class="card">
      <div id="calendar"></div>
    </div>

    <!-- 我的預約 -->
    <div class="card">
      <div class="card-title">我的預約（未來 30 天）</div>
      <div id="my-bookings-list">
        <div class="empty-state">載入中…</div>
      </div>
    </div>

  </div>
</div>

<!-- ── 預約 Modal ─────────────────────────────────────────── -->
<div id="booking-modal" class="modal-overlay" onclick="if(event.target===this)App.closeModal('booking-modal')">
  <div class="modal-card">
    <h2 class="modal-title">新增場地預約</h2>

    <div class="form-group">
      <label class="form-label">場地</label>
      <select id="f-venue" class="form-control"></select>
    </div>

    <div class="form-group">
      <label class="form-label">日期</label>
      <div id="f-date-display" class="form-control" readonly tabindex="-1"></div>
      <input type="hidden" id="f-date">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">開始時間</label>
        <input type="time" id="f-start" class="form-control" step="1800">
      </div>
      <div class="form-group">
        <label class="form-label">結束時間</label>
        <input type="time" id="f-end" class="form-control" step="1800">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">借用目的<span class="required-star">*</span></label>
      <input type="text" id="f-purpose" class="form-control"
             placeholder="例：班級聯誼、讀書會、社團練習">
    </div>

    <div class="form-group">
      <label class="form-label">備註（選填）</label>
      <textarea id="f-notes" class="form-control" rows="2"
                placeholder="使用人數、特殊需求…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="App.closeModal('booking-modal')">取消</button>
      <button class="btn-primary" id="submit-btn" onclick="App.submitBooking()">確認預約</button>
    </div>
  </div>
</div>

<!-- ── 事件詳情 Modal ─────────────────────────────────────── -->
<div id="event-modal" class="modal-overlay" onclick="if(event.target===this)App.closeModal('event-modal')">
  <div class="modal-card">
    <h2 class="modal-title">預約詳細資訊</h2>

    <div class="detail-row">
      <div class="detail-label">場地</div>
      <div class="detail-value">
        <span id="d-venue-badge" class="venue-badge"></span>
      </div>
    </div>

    <div class="detail-row">
      <div class="detail-label">時間</div>
      <div class="detail-value" id="d-time"></div>
    </div>

    <div class="detail-row">
      <div class="detail-label">活動名稱</div>
      <div class="detail-value" id="d-title"></div>
    </div>

    <div class="detail-row" id="d-desc-row">
      <div class="detail-label">詳細說明</div>
      <div class="detail-desc" id="d-desc"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="App.closeModal('event-modal')">關閉</button>
      <button class="btn-danger" id="d-cancel-btn"
              style="display:none" onclick="App.cancelCurrentEvent()">取消預約</button>
    </div>
  </div>
</div>

<!-- ── Toast ──────────────────────────────────────────────── -->
<div id="toast" class="toast"></div>

<!-- ── Scripts ────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<!-- Google API 非同步載入，onload 觸發 App 的初始化函式 -->
<script async defer
  src="https://apis.google.com/js/api.js"
  onload="App.onGapiLoad()"></script>
<script async defer
  src="https://accounts.google.com/gsi/client"
  onload="App.onGisLoad()"></script>

</body>
</html>
